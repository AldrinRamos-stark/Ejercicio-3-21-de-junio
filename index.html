<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admisiones UTO - Formulario de Registro</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <main class="contenedor-formulario-uto">
        <form action="#" method="POST">
            <fieldset>
                <legend>Pre-Inscripción Bachilleres FNI</legend>
                <label>Cédula de Identidad (Con Extensión):</label>
                <input type="text" name="ci" placeholder="Ej. 5748392 OR" required>
                <label>Correo Electrónico Institucional:</label>
                <input type="email" name="correo" placeholder="estudiante@uto.edu.bo" required>
                <label>Justificación de Elección de Carrera:</label>
                <textarea name="motivo" placeholder="¿Por qué deseas ser ingeniero de la FNI?..."></textarea>
                <div class="seccion-acciones">
                    <button type="submit">Procesar Postulación</button>
                    <button type="reset">Borrar Datos</button>
                </div>
            </fieldset>
        </form>
    </main>
</body>
</html>
